<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhysiQ Cuestionarios</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PhysiQ Q">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="app-header">
    <span class="header-logo">Physi<span>Q</span></span>
    <div class="header-patient">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6"/>
      </svg>
      <span id="patient-name">—</span>
    </div>
    <button class="btn-hub-home" onclick="goHubHome()" title="Inicio" aria-label="Ir al inicio">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </button>
  </header>

  <!-- ── Home view ──────────────────────────────────────────── -->
  <div id="view-home">
    <p class="home-title">Cuestionarios validados</p>
    <div id="q-grid"></div>
  </div>

  <!-- ── Questionnaire view ─────────────────────────────────── -->
  <div id="view-questionnaire" hidden></div>

  <!-- ── Result view ────────────────────────────────────────── -->
  <div id="view-result" hidden></div>

</div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
